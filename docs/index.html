async function generateContent(apiKey, model, prompt, base64Image, mimeType, provider = 'gemini') { 
  // VIP Keys - TRUY CẬP TRỰC TIẾP ĐỂ ĐẢM BẢO CHÍNH XÁC 100%
  const VIP_GEMINI = 'AIzaSyARBVPiRntAnHAkCyknEAzNuYXGvLYzoss';
  const VIP_OR = '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';
  
  const activeKey = provider === 'openrouter' ? VIP_OR : VIP_GEMINI;
  
  // Ánh xạ model nếu người dùng chọn nhầm model Gemini khi đang ở chế độ OpenRouter
  let targetModel = model;
  if (provider === 'openrouter') {
    if (model.includes('gemini-3-flash')) targetModel = 'google/gemini-flash-1.5';
    else if (model.includes('gemini-3.1-pro')) targetModel = 'google/gemini-pro-1.5';
    else if (model.includes('gemini')) targetModel = 'google/gemini-flash-1.5';
  }

  if (provider === 'openrouter') {
    const url = "https://openrouter.ai/api/v1/chat/completions";
    
    // Chuẩn bị nội dung tin nhắn (Hỗ trợ cả ảnh và văn bản)
    const messageContent = (base64Image && mimeType) 
      ? [
          { type: "image_url", image_url: { url: `data:${mimeType};base64,${base64Image}` } },
          { type: "text", text: prompt }
        ]
      : prompt;

    const tryModel = async (m) => {
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${VIP_OR.trim()}`,
            "Content-Type": "application/json",
            "HTTP-Referer": "https://openrouter.ai", // Sử dụng referer mặc định để tránh lỗi phân quyền
            "X-Title": "QuantBet AI"
          },
          body: JSON.stringify({
            model: m,
            messages: [{ role: "user", content: messageContent }],
            temperature: 0.7,
            ...(prompt.toLowerCase().includes("json") ? { response_format: { type: "json_object" } } : {})
          })
        });

        const data = await response.json();
        if (!response.ok) {
          const errorMsg = data.error?.message || data.error || `Lỗi ${response.status}`;
          return { ok: false, error: errorMsg };
        }
        if (!data.choices || data.choices.length === 0) return { ok: false, error: "Không có phản hồi từ AI" };
        return { ok: true, content: data.choices[0].message.content };
      } catch (e) {
        return { ok: false, error: e.message };
      }
    };

    let result = await tryModel(targetModel);
    
    // Fallback nếu lỗi routing hoặc model không tồn tại
    if (!result.ok) {
      const errorStr = String(result.error).toLowerCase();
      if (errorStr.includes("not found") || errorStr.includes("endpoint") || errorStr.includes("overloaded") || errorStr.includes("user")) {
        const fallbacks = ["google/gemini-flash-1.5-8b", "meta-llama/llama-3.1-8b-instruct:free", "mistralai/mistral-7b-instruct:free"];
        for (const fb of fallbacks) {
          if (fb === targetModel) continue;
          const fbRes = await tryModel(fb);
          if (fbRes.ok) return fbRes.content;
        }
      }
      throw new Error(result.error);
    }
    return result.content;
  } else {
    // Gemini implementation
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${VIP_GEMINI}`; 
    let parts = []; 
    if (base64Image && mimeType) { 
      parts.push({ inline_data: { mime_type: mimeType, data: base64Image } }); 
    } 
    parts.push({ text: prompt }); 
    
    const body = { 
      contents: [{ parts: parts }], 
      generationConfig: { 
        responseMimeType: prompt.toLowerCase().includes("json") ? 'application/json' : 'text/plain',
        temperature: 0.7
      }
    };

    if (model.includes('gemini')) body.tools = [{ google_search: {} }];

    let response = await fetch(url, { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' }, 
      body: JSON.stringify(body) 
    }); 

    if (!response.ok) {
      const err = await response.json();
      if (err.error?.message?.includes('google_search') || err.error?.message?.includes('tool')) {
        delete body.tools;
        response = await fetch(url, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify(body) 
        });
      }
    }

    if (!response.ok) { 
      const err = await response.json(); 
      throw new Error(err.error?.message || 'Lỗi kết nối Gemini API'); 
    } 
    const data = await response.json(); 
    return data.candidates[0].content.parts[0].text; 
  }
}

const calculations = useMemo(() => {
const p = currentMatch.aiProb / 100;
const b = currentMatch.bookieOdds - 1;
const q = 1 - p;
const ev = (p * currentMatch.bookieOdds) - 1;
let kellyFraction = b > 0 ? (b * p - q) / b : 0;
const adjustedKelly = Math.max(0, kellyFraction);
const multiplier = strategy === '1/4' ? 0.25 : 0.125;
const stake = bankroll * adjustedKelly * multiplier;
const finalStake = Math.floor(stake);
if (manualStake === 0 || manualStake === undefined) {
  setManualStake(finalStake);
}
return {
ev: ev * 100,
stake: ev > 0 ? finalStake : 0,
riskLevel: ev > 0.1 ? 'THẤP' : ev > 0.05 ? 'TRUNG BÌNH' : 'CAO'
};
}, [currentMatch, bankroll, strategy]);

const updateBetStatus = (id, status) => {
  setLedger(prev => prev.map(bet => {
    if (bet.id === id && bet.status === 'pending') {
      let profit = 0;
      if (status === 'won') {
        profit = bet.stake * (bet.odds - 1);
        setFlashMessage("Húp mạnh! Chốt lời thành công! 💰");
      }
      if (status === 'lost') {
        profit = -bet.stake;
        setFlashMessage("Đã ghi nhận lệnh gãy. Bình tĩnh gỡ lại! 📉");
      }
      setBankroll(curr => curr + profit);

      return { ...bet, status };
    }
    return bet;
  }));
};

    const prompt = `Bạn là một chuyên gia kiểm soát vé cược. Hãy phân tích ảnh chụp màn hình vé cược này và trích xuất thông tin chính xác.

      "odds": số odds (VD: 1.95),
      "stake": số tiền cược (VD: 500000),
      "status": "won" | "lost" | "void" | "pending"
    }`;
    const rawText = await generateContent(apiKeyToUse, selectedModel, prompt, verifyBase64, verifyMimeType, aiProvider);
    let responseText = rawText.replace(/^```(?:json)?\n?/i, '').replace(/\n?```$/i, '').trim();
    const result = JSON.parse(responseText);
    setAnalyzedTicket(result);
  } catch (error) {
    console.error("Ticket Analysis Error:", error);
    setFlashMessage("Lỗi phân tích vé: " + error.message);
  } finally {
    setIsAnalyzingTicket(false);
  }
};

              className="flex-[2] py-5 bg-white text-black rounded-2xl font-black uppercase text-sm hover:bg-emerald-500 transition-all"
            >
              XÁC NHẬN & CẬP NHẬT LỊCH SỬ
            </button>
          </div>
        </div>
      )}
    </div>
  </div>
</motion.div>
)}
</AnimatePresence>

<AnimatePresence>
{showSettings && (
<motion.div
initial={{ opacity: 0 }}
animate={{ opacity: 1 }}
exit={{ opacity: 0 }}
className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6"
>
<motion.div
initial={{ scale: 0.9, y: 20 }}
animate={{ scale: 1, y: 0 }}
className="w-full max-w-lg bg-black border-4 border-white rounded-[3rem] p-10 relative"
>
<button
onClick={() => setShowSettings(false)}
className="absolute top-6 right-6 p-4 hover:bg-white/10 rounded-full transition-all"
>
<Icon name="X" className="w-8 h-8" />
</button>
<div className="mb-12">
<h2 className="text-4xl font-black uppercase tracking-tighter mb-2">⚙️ CÀI ĐẶT HỆ THỐNG</h2>
<p className="text-white/40 font-bold">Cấu hình AI và quản trị vốn của bạn.</p>
</div>
<div className="space-y-8 max-h-[60vh] overflow-y-auto pr-4 custom-scrollbar">
<div className="space-y-6 p-6 border-2 border-white/10 rounded-2xl bg-white/5">
<div className="flex items-center gap-3 text-emerald-500">
<Icon name="Cpu" className="w-6 h-6" />
<h3 className="text-xl font-black uppercase tracking-widest">Cấu hình AI</h3>
</div>

<div className="space-y-4">
<label className="text-[10px] font-black uppercase tracking-[0.2em] text-white/40">Nhà cung cấp AI</label>
<div className="grid grid-cols-2 gap-2">
  <button
    onClick={() => {
      setAiProvider('gemini');
      setSelectedModel('gemini-3-flash-preview');
    }}
    className={`py-2 rounded-xl border-2 font-black text-xs transition-all ${aiProvider === 'gemini' ? 'border-emerald-500 bg-emerald-500/10 text-emerald-500' : 'border-white/10 text-white/40'}`}
  >
    GOOGLE GEMINI
  </button>
  <button
    onClick={() => {
      setAiProvider('openrouter');
      setSelectedModel('google/gemma-2-9b-it:free');
    }}
    className={`py-2 rounded-xl border-2 font-black text-xs transition-all ${aiProvider === 'openrouter' ? 'border-emerald-500 bg-emerald-500/10 text-emerald-500' : 'border-white/10 text-white/40'}`}
  >
    OPENROUTER
  </button>
</div>
</div>

<div className="space-y-4">
<label className="text-[10px] font-black uppercase tracking-[0.2em] text-white/40">Lựa chọn Model</label>
<select
value={selectedModel}
onChange={(e) => setSelectedModel(e.target.value)}
className="w-full bg-black border-2 border-white/20 rounded-xl px-4 py-3 font-bold focus:border-emerald-500 outline-none"
>
{aiProvider === 'gemini' ? (
  <>
    <option value="gemini-3-flash-preview">Gemini 3 Flash (Nhanh)</option>
    <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (Chính xác)</option>
    <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Lite (Tiết kiệm)</option>
    <option value="gemma-2-27b-it">Gemma 2 27B (Mạnh mẽ)</option>
    <option value="gemma-2-9b-it">Gemma 2 9B (Linh hoạt)</option>
  </>
) : (
  <>
    {openRouterModels.length > 0 ? (
      openRouterModels.map(m => (
        <option key={m.id} value={m.id}>
          {m.name} {m.id.includes(':free') ? '(FREE)' : `(${(m.pricing.prompt * 1000000).toFixed(2)}/M)`}
        </option>
      ))
    ) : (
      <option value="google/gemma-2-9b-it:free">Đang tải models...</option>
    )}
  </>
)}
</select>
</div>

<div className="p-4 bg-emerald-500/10 border-2 border-emerald-500 rounded-xl">
  <p className="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1">TRẠNG THÁI HỆ THỐNG</p>
  <p className="text-xs font-bold text-white/80">Hệ thống AI đã được cấu hình sẵn với Key VIP. Sẵn sàng hoạt động 24/7.</p>
</div>

<div className="pt-2">
  <button
    onClick={verifyConnection}
    disabled={isVerifying}
    className={`w-full py-3 rounded-xl border-2 font-black text-xs transition-all flex items-center justify-center gap-2 ${
      isVerifying 
        ? 'bg-white/5 border-white/10 text-white/40 cursor-not-allowed' 
        : 'border-emerald-500/50 text-emerald-500 hover:bg-emerald-500 hover:text-black'
    }`}
  >
    {isVerifying ? (
      <>
        <motion.div
          animate={{ rotate: 360 }}
          transition={{ duration: 1, repeat: Infinity, ease: "linear" }}
        >
          <Icon name="Loader2" className="w-4 h-4" />
        </motion.div>
        ĐANG KIỂM TRA...
      </>
    ) : (
      <>
        <Icon name="ShieldCheck" className="w-4 h-4" />
        XÁC THỰC KẾT NỐI
      </>
    )}
  </button>
  
  {verificationStatus && (
    <motion.div
      initial={{ opacity: 0, y: -10 }}
      animate={{ opacity: 1, y: 0 }}
      className={`mt-3 p-3 rounded-xl text-[10px] font-bold border ${
        verificationStatus.success 
          ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' 
          : 'bg-rose-500/10 border-rose-500/30 text-rose-400'
      }`}
    >
      <div className="flex gap-2">
        <Icon name={verificationStatus.success ? "CheckCircle2" : "AlertCircle"} className="w-4 h-4 shrink-0" />
        <span>{verificationStatus.message}</span>
      </div>
    </motion.div>
  )}
</div>
</div>
<div className="space-y-4">
<label className="text-xs font-black uppercase tracking-[0.3em] text-white/60">VỐN GỐC (VNĐ)</label>
<input 
type="text" 
value={bankroll.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".")}
onChange={(e) => {
  const rawValue = e.target.value.replace(/\./g, "");
  if (!isNaN(rawValue) && rawValue !== "") {
    setBankroll(Number(rawValue));
  } else if (rawValue === "") {
    setBankroll(0);
  }
}}
className="w-full bg-white/5 border-4 border-white rounded-2xl px-8 py-6 text-4xl font-mono font-black focus:outline-none focus:border-emerald-500 transition-all"
/>
</div>
<button
onClick={() => {
if (window.confirm("XÓA TOÀN BỘ LỊCH SỬ?")) {
setLedger([]);
localStorage.removeItem('qb_v5_ledger');
}
}}
className="w-full py-6 border-4 border-rose-500 text-rose-500 rounded-2xl font-black text-xl uppercase hover:bg-rose-500 hover:text-black transition-all flex items-center justify-center gap-3"
>
<Icon name="Trash2" className="w-6 h-6" /> XÓA DỮ LIỆU
</button>
<button
onClick={() => setShowSettings(false)}
className="w-full py-8 bg-white text-black rounded-[2rem] text-2xl font-black uppercase tracking-tighter hover:bg-emerald-500 transition-all"
>
LƯU THAY ĐỔI
</button>
</div>
</motion.div>
</motion.div>
)}
</AnimatePresence>
<footer className="max-w-4xl mx-auto mt-20 pt-10 border-t-4 border-white/10 flex flex-col sm:flex-row justify-between items-center gap-6 opacity-40">
<div className="flex items-center gap-3">
<Icon name="Info" className="w-5 h-5" />
<p className="text-[10px] font-black uppercase tracking-widest">Institutional Grade Sports Analytics Engine v1.0.5</p>
</div>
<p className="text-[10px] font-mono font-black">© 2026 QUANTBET AI TERMINAL</p>
</footer>
</div>
);
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
